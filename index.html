<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moon Claw</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(#f7fbff,#e8f6ff);
    color:#444;
}

header{
    background:white;
    text-align:center;
    padding:30px 20px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
    color:#8d6bff;
    font-size:40px;
    margin:0;
}

.subtitle{
    color:#66bfe8;
    margin-top:10px;
}

.card{
    background:white;
    width:85%;
    margin:30px auto;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.progress{
    width:100%;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
}

.bar{
    width:0%;
    background:#7fd7ff;
    color:white;
    text-align:center;
    padding:8px 0;
}

footer{
    text-align:center;
    color:#888;
    margin:40px;
}
</style>

</head>

<body>

<header>
<h1>🌙 Moon Claw 🐾</h1>
<p class="subtitle">Lee Know Photocard Collection</p>
</header>

<div class="card">
<h2>📊 Collection Progress</h2>

<div class="progress">
<div class="bar">0%</div>
</div>

<p>ようこそ、Moon Clawへ！</p>
<p>ここからリノのトレカコレクションを記録していきます✨</p>

</div>

<footer>
Made with 🩵 by Yuka
</footer>

</body>
</html>
